<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Evidence turns agent work into an outcome: Contract, Observe, Change, Verify, Integrate, Learn or stop">
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="var(--line)" stroke-width="1" opacity="0.28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="86" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="19" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">BOUNDED ENGINEERING LOOP</text>
  <text x="70" y="155" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Evidence turns agent work into an outcome</text>
  <g>
      <rect x="80" y="235" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="104" cy="241" r="18" fill="var(--accent)"/>
      <text x="104" y="248" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">1</text>
      <text x="235" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="235" dy="0">Contract</tspan></text>
      <path d="M 398 299 H 433" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="445" y="235" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="469" cy="241" r="18" fill="var(--accent)"/>
      <text x="469" y="248" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">2</text>
      <text x="600" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="600" dy="0">Observe</tspan></text>
      <path d="M 763 299 H 798" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="810" y="235" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="834" cy="241" r="18" fill="var(--accent)"/>
      <text x="834" y="248" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">3</text>
      <text x="965" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="965" dy="0">Change</tspan></text>
      <path d="M 965 371 C 965 429, 235 364, 235 418" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="80" y="430" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="104" cy="436" r="18" fill="var(--accent)"/>
      <text x="104" y="443" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">4</text>
      <text x="235" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="235" dy="0">Verify</tspan></text>
      <path d="M 398 494 H 433" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="445" y="430" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="469" cy="436" r="18" fill="var(--accent)"/>
      <text x="469" y="443" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">5</text>
      <text x="600" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="600" dy="0">Integrate</tspan></text>
      <path d="M 763 494 H 798" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="810" y="430" width="310" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="834" cy="436" r="18" fill="var(--accent)"/>
      <text x="834" y="443" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="var(--surface)">6</text>
      <text x="965" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="var(--ink)"><tspan x="965" dy="0">Learn or stop</tspan></text>
    </g>
  <text x="600" y="630" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="var(--faint)">one orchestrator · scoped workers · explicit terminal state</text>
</svg>
