<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pretraining, post-training, and the production harness do different jobs</title>
  <desc id="desc">Pretraining creates broad capability, post-training can shape behavior with supervised examples and preference or verifiable rewards, and the model works inside a runtime harness containing platform context, tools, and an execution environment.</desc>
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="84" class="mono" font-size="24" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">THE MINIMUM TRAINING SCIENCE</text>
  <text x="70" y="145" class="sans" font-size="38" font-weight="750" letter-spacing="-1" fill="var(--ink)">Capability, behavior, and execution are separate</text>

  <g aria-label="Pretraining creates broad capability">
    <rect x="62" y="214" width="300" height="336" rx="20" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="92" y="260" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">1 · PRETRAINING</text>
    <text x="92" y="323" class="sans" font-size="34" font-weight="730" fill="var(--ink)">Broad capability</text>
    <text x="92" y="380" class="sans" font-size="28" fill="var(--faint)"><tspan x="92">Patterns from</tspan><tspan x="92" dy="38">text and code</tspan></text>
    <rect x="92" y="466" width="240" height="58" rx="29" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="212" y="504" text-anchor="middle" class="sans" font-size="28" font-weight="680" fill="var(--ink)">Base model</text>
  </g>
  <path d="M374 382H416" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>

  <g aria-label="Post-training shapes behavior">
    <rect x="428" y="214" width="336" height="336" rx="20" fill="var(--surface)" stroke="var(--accent)" stroke-width="3"/>
    <text x="458" y="260" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">2 · POST-TRAINING</text>
    <text x="458" y="323" class="sans" font-size="34" font-weight="730" fill="var(--ink)">Task behavior</text>
    <rect x="458" y="352" width="276" height="66" rx="13" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="596" y="395" text-anchor="middle" class="sans" font-size="28" font-weight="680" fill="var(--ink)">Examples</text>
    <rect x="458" y="442" width="276" height="66" rx="13" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="596" y="485" text-anchor="middle" class="sans" font-size="28" font-weight="680" fill="var(--ink)">Rewards</text>
  </g>
  <path d="M776 382H818" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>

  <g aria-label="Runtime harness contains platform context, tools, and an execution environment">
    <rect x="830" y="192" width="304" height="380" rx="22" fill="none" stroke="var(--accent)" stroke-width="3"/>
    <text x="860" y="238" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">RUNTIME HARNESS</text>
    <rect x="848" y="270" width="268" height="72" rx="16" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="982" y="317" text-anchor="middle" class="sans" font-size="30" font-weight="720" fill="var(--ink)">Trained model</text>
    <rect x="848" y="366" width="268" height="62" rx="12" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="982" y="407" text-anchor="middle" class="sans" font-size="28" font-weight="670" fill="var(--ink)">Context</text>
    <rect x="848" y="446" width="268" height="76" rx="12" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="982" y="494" text-anchor="middle" class="sans" font-size="28" font-weight="670" fill="var(--ink)">Tools + execution</text>
  </g>
</svg>
