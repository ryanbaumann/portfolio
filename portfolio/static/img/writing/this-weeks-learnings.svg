  <text class="title" x="480" y="330" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700">#ThisWeeksLearnings</text>
  <text class="body" x="480" y="392" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="30">what shipping taught me this week</text>
