          - generic [ref=e82]:
            - paragraph [ref=e84]:
              - text: Accurately measuring our models’ capabilities is important for sound deployment and safety decisions, including decisions under OpenAI’s
              - link "Preparedness Framework⁠ (opens in a new window)" [ref=e85] [cursor=pointer]:
                - /url: https://cdn.openai.com/pdf/18a02b5d-6b67-4cec-ab64-68cdfbddebcd/preparedness-framework-v2.pdf
                - text: Preparedness Framework⁠
                - generic [ref=e86]: (opens in a new window)
              - text: . With each model release, we report results for a variety of external and internal benchmarks to track model progress. When evaluations have flaws that affect results, they can give a false understanding of capabilities, misrepresenting safety cases and affecting research priorities.
            - paragraph [ref=e88]:
              - text: We
              - link "recently investigated" [ref=e89] [cursor=pointer]:
                - /url: /index/why-we-no-longer-evaluate-swe-bench-verified/
              - text: how one of the most widely used coding benchmarks, SWE-bench Verified, had fundamental design and contamination issues, and found that the eval no longer provided meaningful signal on software development capabilities. At the time, we encouraged the wider community to switch to SWE-Bench Pro.
            - paragraph [ref=e91]:
              - link "SWE-Bench Pro⁠ (opens in a new window)" [ref=e92] [cursor=pointer]:
                - /url: https://scale.com/blog/swe-bench-pro
                - generic [ref=e93]: SWE-Bench Pro
                - text: ⁠
                - generic [ref=e94]: (opens in a new window)
              - text: was designed to improve on SWE-bench Verified by testing models on longer horizons and more realistic coding tasks to better track agentic coding capabilities. As in SWE-bench Verified, tasks are sourced programmatically from the history of feature changes in a set of public and private repositories. Models are required to implement a solution that passes new tests for a feature, without breaking existing functionality. On the 731-task public split, frontier models improved from a pass rate of 23.3% to 80.3% in eight months.
            - paragraph [ref=e96]: We’ve since performed a similar audit on SWE-Bench Pro, reviewing the dataset using a datapoint analysis pipeline. The pipeline reviewed model attempts at the task, task metadata, and failure traces to flag likely evaluation flaws. Each flagged task was then assessed through multiple investigator-agent passes and independently reviewed by five experienced software engineers, with disagreements escalated for further investigation.
            - figure [ref=e98]:
              - paragraph [ref=e107]: We find evidence of breaking issues in a significant portion of the dataset. Our datapoint analysis pipeline flagged 200 (27.4%) broken tasks, while the human annotation campaign identified 249 (34.1%).
            - paragraph [ref=e109]: "The issues primarily fell into four categories:"
            - list [ref=e111]:
              - listitem [ref=e112]:
                - generic [ref=e113]: Overly strict tests
                - superscript [ref=e114]:
                  - link "1" [ref=e116] [cursor=pointer]:
                    - /url: "#citation-bottom-1"
                - text: enforce specific implementation details not specified in the prompt, invalidating many functionally correct submissions.
              - listitem [ref=e117]:
                - generic [ref=e118]: Underspecified prompts
                - superscript [ref=e119]:
                  - link "2" [ref=e121] [cursor=pointer]:
                    - /url: "#citation-bottom-2"
                - text: omit requirements that hidden tests enforce and that are not reasonably inferable.
              - listitem [ref=e122]:
                - generic [ref=e123]: Low-coverage tests
                - text: under check the requested feature, so incomplete fixes can pass.
              - listitem [ref=e124]:
                - text: A
                - generic [ref=e125]: misleading prompt
                - text: points models toward the wrong behavior or contradicts what tests require.
            - paragraph [ref=e127]: Our findings point to the difficulty of curating hard but fair benchmarks and the growing utility of agents for scalable data quality checks. In light of these results, we estimate that ~30% of SWE-bench Pro tasks are broken, and advise that model developers carefully examine results.
            - heading "Methodology" [level=2] [ref=e131]
            - paragraph [ref=e133]: Our aim is to ensure that task failures reflect genuine model limitations, and task successes reflect complete and valid solutions to the prompt requirements. To check the quality of the data used in the evaluation, we created a quality assurance pipeline to assess whether each datapoint accurately reflects model capabilities.
            - figure [ref=e135]:
              - generic [ref=e136]:
                - img "Quality assurance workflow combining automated screening and human review to assess task quality." [ref=e143]
                - paragraph [ref=e150]: An initial data quality pipeline flags problems for review. We validate with a deeper agent-assisted audit of flagged tasks and a human annotation campaign working with experienced engineers.
            - paragraph [ref=e152]: "An initial automated filter reviews the instructions given to the model, attempts by the model to solve the task, and the tests used to grade these attempts to flag likely broken or problematic examples. This filter flagged 286 potentially broken tasks. We then conducted a deeper review of that subset in two ways: a human-supervised agent review, which conducts extensive checks with investigator agents and a final human judgment; and a human annotation campaign working with experienced software developers."
            - heading "Human-supervised agent review" [level=2] [ref=e156]
            - paragraph [ref=e158]: Each flagged problem is audited with Codex-based investigator agents that were given access to the task repository and environment. This helps them distinguish reasonable task ambiguity, which can often be resolved by studying nearby code and repository conventions, from true underspecification. The agent can run tests, inspect files in the repo, and investigate model attempts and their common failure modes on the task. After several independent repeats of these deeper audits, a researcher reviewed the summaries, made a final judgment, and labeled the likely issues.
            - heading "Human annotation campaign" [level=2] [ref=e162]
            - paragraph [ref=e164]: In parallel, we ran a human annotation campaign over the flagged subset. We worked with experienced software engineers who were trained on the benchmark goals, issue taxonomy, and edge cases before reviewing tasks. Each task was reviewed by five engineers.
            - paragraph [ref=e166]: Reviewers formed an independent judgment from the visible problem statement, test cases, and the ground-truth reference solution (known as the gold patch) before using the pipeline analysis or transcript as supporting context. The reviewers then assigned a label and severity rating based on concrete evidence, and escalated disagreements or low-confidence cases for further review.
            - paragraph [ref=e168]: Human reviewers were more likely than the investigator agents to mark tasks as broken. There was also some disagreement on categories between the two review paths, but in no flagged task was “not broken” the most common human label. Of the categories the agent pipeline flagged, reviewers’ judgments overlapped in 74% of cases.
            - paragraph [ref=e170]: "Compared with the agent pipeline, the human reviewers were also more likely to select multiple labels for a task, indicating that they found tasks to be broken in multiple ways or did not fit cleanly into a single category. This suggests the agent-plus-reviewer pipeline resulted in conservative labeling: it captured the same broad failure modes humans identified, while undercounting cases where reviewers saw additional or overlapping issues. The largest difference was in low-coverage tests, which humans selected as the most common issue for 9.4% of the benchmark compared with 4.1% from the agent pipeline."
