name: Deploy Strava Explorer

on:
  push:
    branches:
      - main
    paths:
      - 'strava-explorer/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Force redeploy Cloud Run OAuth broker'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    if: github.repository == 'ryanbaumann/trails.ninja'

    permissions:
      contents: 'read'
      id-token: 'write' # Required for Workload Identity Federation

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        # Supports Workload Identity Federation (recommended)
        workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
        service_account: ${{ secrets.GCP_SA_EMAIL }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'strava-explorer/package-lock.json'

    - name: Check for Server Changes
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          server:
            - 'strava-explorer/server/**'

    - name: Install Frontend Dependencies
      run: |
        cd strava-explorer
        npm ci

    - name: Deploy App
      env:
        VITE_GMP_API_KEY: ${{ secrets.VITE_GMP_API_KEY }}
        VITE_STRAVA_CLIENT_ID: ${{ secrets.VITE_STRAVA_CLIENT_ID }}
        VITE_STRAVA_CLIENT_SECRET: ${{ secrets.VITE_STRAVA_CLIENT_SECRET }}
        STRAVA_CLIENT_SECRET: ${{ secrets.VITE_STRAVA_CLIENT_SECRET }}
        DEPLOY_BACKEND: ${{ github.event.inputs.deploy_backend || steps.changes.outputs.server }}
      run: |
        cd strava-explorer
        chmod +x scripts/deploy-gcp.sh scripts/deploy-gcs.sh
        
        # Determine the account email to use for the script.
        # Fallback to active gcloud account if GCP_SA_EMAIL is not provided.
        ACCOUNT_EMAIL="${{ secrets.GCP_SA_EMAIL }}"
        if [ -z "$ACCOUNT_EMAIL" ]; then
          ACCOUNT_EMAIL=$(gcloud config get-value account)
        fi
        
        # Force production redirect URI fallback (unset local redirect overrides)
        unset VITE_STRAVA_REDIRECT_URI
        
        ./scripts/deploy-gcp.sh \
          --account "$ACCOUNT_EMAIL" \
          --project "${{ vars.GCP_PROJECT_ID }}" \
          --bucket "${{ vars.GCS_BUCKET }}"
