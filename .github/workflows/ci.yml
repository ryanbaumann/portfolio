name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  package-checks:
    name: ${{ matrix.package }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [portfolio, aqi-map, isochrones, gateway, strava-explorer]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ${{ matrix.package }}
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Linter
        working-directory: ${{ matrix.package }}
        run: npm run lint --if-present

      - name: Run Tests
        working-directory: ${{ matrix.package }}
        run: npm test --if-present

      - name: Build Application
        working-directory: ${{ matrix.package }}
        run: npm run build --if-present

  build-and-smoke:
    name: Build all apps + gateway smoke test
    runs-on: ubuntu-latest
    # No secrets here: this job builds and smoke-tests the container's
    # contents with dummy/no keys (see scripts/build-local.mjs and
    # scripts/smoke.mjs), so it's safe to run on pull_request from forks.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Build every app (stages apps/<name>/ like the Dockerfile does)
        run: node scripts/build-local.mjs

      - name: Run gateway unit tests
        working-directory: gateway
        run: node --test

      - name: Smoke test the gateway against the staged apps
        run: node scripts/smoke.mjs

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      
      - name: Build Docker Image
        run: docker build -t ryan-baumann-portfolio .

  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Secret Scanner (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
