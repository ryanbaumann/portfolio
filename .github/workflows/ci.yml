name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A new push to the same branch/PR supersedes the running check. Cancel the
# old run instead of queueing behind it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  package-checks:
    name: ${{ matrix.package }} checks
    runs-on: ubuntu-latest
    # Every job here finishes in under a minute when healthy. A tight timeout
    # turns a hang (see LEARNINGS.md, 2026-07-12 node --test entry) into a
    # fast red X instead of a 6-hour stuck run.
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [portfolio, demos/aqi-map, demos/isochrones, gateway, demos/strava-explorer]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          # The gateway is zero-dependency and has no lockfile; point the
          # cache at every lockfile that exists instead of the matrix path.
          cache-dependency-path: '**/package-lock.json'

      - name: Install Dependencies
        working-directory: ${{ matrix.package }}
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Linter
        working-directory: ${{ matrix.package }}
        run: npm run lint --if-present

      - name: Run Tests
        working-directory: ${{ matrix.package }}
        run: npm test --if-present

      - name: Build Application
        working-directory: ${{ matrix.package }}
        run: npm run build --if-present

  build-and-smoke:
    name: Build all apps + gateway smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No secrets here: this job builds and smoke-tests the container's
    # contents with dummy/no keys (see scripts/build-local.mjs and
    # scripts/smoke.mjs), so it's safe to run on pull_request from forks.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Build every app (stages apps/<name>/ like the Dockerfile does)
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
        run: node scripts/build-local.mjs

      # Use `npm test` (not raw `node --test`): the npm script sets
      # NODE_ENV=test. The server also guards on NODE_TEST_CONTEXT now, but
      # belt and suspenders — a listening socket here hung CI for hours.
      - name: Run gateway unit tests
        working-directory: gateway
        run: npm test

      - name: Smoke test the gateway against the staged apps
        run: node scripts/smoke.mjs

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Layer-cached via the GitHub Actions cache: unchanged apps rebuild
      # from cache instead of re-running npm ci + vite build in every stage.
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ryan-baumann-portfolio
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Secret Scanner (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
