name: CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  strava-explorer:
    name: strava-explorer lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'strava-explorer/package-lock.json'

      - name: Install Dependencies
        working-directory: strava-explorer
        run: npm ci

      - name: Run Linter
        working-directory: strava-explorer
        run: npm run lint

      - name: Run Unit & Broker Tests
        working-directory: strava-explorer
        run: npm test

      - name: Build Application
        working-directory: strava-explorer
        run: npm run build

  build-and-smoke:
    name: Build all apps + gateway smoke test
    runs-on: ubuntu-latest
    # No secrets here: this job builds and smoke-tests the container's
    # contents with dummy/no keys (see scripts/build-local.mjs and
    # scripts/smoke.mjs), so it's safe to run on pull_request from forks.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build every app (stages apps/<name>/ like the Dockerfile does)
        run: node scripts/build-local.mjs

      - name: Run gateway unit tests
        working-directory: gateway
        run: node --test

      - name: Smoke test the gateway against the staged apps
        run: node scripts/smoke.mjs
