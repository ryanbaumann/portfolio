<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isochrones — Google Maps Platform Demo</title>
    <meta name="description" content="Interactive reachability analysis: drive, bike, and walk isochrones from the Google Maps Platform Isochrones API." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>" />
  </head>
  <body>
    <div id="app">
      <aside class="panel" aria-label="Isochrone controls">
        <header class="panel-header">
          <a class="home-link" href="/" aria-label="Back to trails.ninja home">&larr; trails.ninja</a>
          <p class="eyebrow">Google Maps Platform demo</p>
          <h1>Isochrones</h1>
          <p class="lede">How far can you reach in 10, 20, 30 minutes? Pick a scenario, drop a point, and the rings draw themselves.</p>
        </header>

        <section class="card">
          <label for="place-search">Start from</label>
          <div id="search-slot"></div>
          <p class="hint">…or click anywhere on the map, or drag the pin.</p>

          <div class="scenario-grid" role="group" aria-label="Scenario">
            <button class="scenario is-active" data-scenario="delivery" type="button" aria-pressed="true">
              <span class="scenario-icon" aria-hidden="true">📦</span>
              <strong>Delivery</strong>
              <span>30-min courier radius</span>
            </button>
            <button class="scenario" data-scenario="commute" type="button" aria-pressed="false">
              <span class="scenario-icon" aria-hidden="true">🏢</span>
              <strong>Commute</strong>
              <span>45-min drive to work</span>
            </button>
            <button class="scenario" data-scenario="response" type="button" aria-pressed="false">
              <span class="scenario-icon" aria-hidden="true">🚑</span>
              <strong>Response</strong>
              <span>20-min emergency SLA</span>
            </button>
          </div>

          <details class="advanced">
            <summary>Fine-tune</summary>
            <label>Travel mode
              <select id="mode-select">
                <option value="DRIVE">Drive</option>
                <option value="BICYCLE">Bicycle</option>
                <option value="WALK">Walk</option>
              </select>
            </label>
            <label>Direction
              <select id="direction-select">
                <option value="FROM">Leaving the origin</option>
                <option value="TO">Arriving at the origin</option>
              </select>
            </label>
            <label>Traffic
              <select id="routing-select">
                <option value="TRAFFIC_UNAWARE">Typical (planning)</option>
                <option value="TRAFFIC_AWARE">Live traffic</option>
              </select>
            </label>
            <label>Max minutes <output id="duration-label" for="duration-input">30</output>
              <input id="duration-input" type="range" min="10" max="60" step="5" value="30" />
            </label>
            <label class="check"><input id="smooth-input" type="checkbox" checked /> Smooth polygon edges</label>
          </details>

          <p id="status" role="status" aria-live="polite"></p>
        </section>

        <section class="card insights" aria-label="Reachability results">
          <div class="insights-header">
            <h2>Reachable area</h2>
            <span id="origin-label" class="origin-label"></span>
          </div>
          <div id="stats" class="stats"></div>
        </section>

        <footer class="credits">
          Rings from the <a href="https://developers.google.com/maps/documentation/isochrones" rel="noopener">Isochrones API</a>, proxied server-side.
        </footer>
      </aside>

      <main class="map-shell">
        <div id="map" aria-label="Interactive isochrone map"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
