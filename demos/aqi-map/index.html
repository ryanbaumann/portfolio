<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Quality Map: a Google Maps Platform demo</title>
    <meta name="description" content="Live air quality heatmap and point conditions from the Google Maps Platform Air Quality API on a 2D Google map." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌫️</text></svg>" />
  </head>
  <body>
    <div id="app">
      <aside class="panel" aria-label="Air quality controls">
        <a class="home-link" href="/" aria-label="Back to Ryan Baumann home">&larr; Ryan Baumann</a>
        <p class="eyebrow">Google Maps Platform demo</p>
        <h1>Air Quality</h1>
        <p class="lede">Live air-quality heatmap from the Air Quality API. Click anywhere on the map for local conditions.</p>

        <section class="card">
          <label for="place-search">Find a place</label>
          <div id="search-slot"></div>

          <label for="layer-select">Heatmap layer</label>
          <select id="layer-select">
            <option value="UAQI_RED_GREEN">Universal AQI</option>
            <option value="US_AQI">US AQI (EPA)</option>
            <option value="PM25_INDEX">PM2.5 index</option>
          </select>

          <label for="opacity-input">Heatmap opacity <span id="opacity-label">70%</span></label>
          <input id="opacity-input" type="range" min="10" max="100" step="5" value="70" />

          <div class="legend" aria-hidden="true">
            <div id="legend-bar" class="legend-bar"></div>
            <div class="legend-labels"><span id="legend-min"></span><span id="legend-max"></span></div>
          </div>
          <p id="status" role="status" aria-live="polite"></p>
        </section>

        <section id="conditions" class="card conditions" hidden aria-live="polite">
          <h2>Local conditions</h2>
          <div class="aqi-headline">
            <span id="aqi-value" class="aqi-value">–</span>
            <div>
              <p id="aqi-category" class="aqi-category"></p>
              <p id="aqi-index-name" class="aqi-index-name"></p>
            </div>
          </div>
          <p id="aqi-pollutant" class="aqi-pollutant"></p>
          <ul id="pollutant-list" class="pollutant-list"></ul>
          <p id="aqi-time" class="aqi-time"></p>
        </section>

        <footer class="credits">
          Data: <a href="https://developers.google.com/maps/documentation/air-quality" rel="noopener">Google Maps Platform Air Quality API</a>
        </footer>
      </aside>

      <main class="map-shell">
        <div id="map" aria-label="Air quality map"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
